---
name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          # renovate: github-releases=goreleaser/goreleaser
          version: v2.14.3
          args: release --clean --config ./build/ci/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  chart-release:
    runs-on: ubuntu-latest
    needs: goreleaser

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package chart
        working-directory: ./deploy/helm
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          helm package --app-version "${RELEASE_VERSION}" --version "${RELEASE_VERSION}" --destination dist/
      
      - name: Fetch chart name
        working-directory: ./deploy/helm
        id: lookupChartName
        uses: mikefarah/yq@master
        with:
          cmd: yq -r '.name' Chart.yaml

      - name: Publish chart
        working-directory: ./deploy/helm/dist
        run: |
          CHART_NAME=${{ steps.lookupChartName.outputs.result }}
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          helm push "${CHART_NAME}-${RELEASE_VERSION}.tgz"
